name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t python-docker-ci .

      - name: Run Smoke Test
        run: |
          # 1. Run the container in the background (-d) and map the port
          docker run -d -p 8000:8000 --name smoke-test-container python-docker-ci
          
          # 2. Wait a few seconds to ensure the Uvicorn server has fully started
          sleep 3
          
          # 3. Hit the health endpoint. The --fail flag ensures that if the server returns a 4xx or 5xx error, the curl command fails, thus failing the entire pipeline.
          curl --fail http://localhost:8000/health